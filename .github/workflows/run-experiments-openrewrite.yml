name: OpenRewrite

on:
  push:
    paths:
      - '.github/workflows/run-experiments-openrewrite.yml'
  schedule:
    - cron: "0 4 * * 5"
  workflow_dispatch:

permissions:
  contents: read

env:
  DEVELOCITY_URL: "https://ge.solutions-team.gradle.com"
  GIT_REPO: "https://github.com/openrewrite/rewrite"
  TASKS: "build"

jobs:
  Experiment:
    strategy:
      fail-fast: false
      matrix:
        include:
          - experimentId: 1
          - experimentId: 2
          - experimentId: 3
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 21
          distribution: "temurin"
      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Add git hook to exclude failing tests
        run: |
          mkdir ~/git-hooks
          cat > ~/git-hooks/post-checkout << 'HOOK'
          #!/bin/bash
          # NOTE: must append to build.gradle.kts (not build.gradle) — creating build.gradle would shadow the Kotlin DSL file.
          cat >> build.gradle.kts << 'GRADLE'

          project(":rewrite-kotlin") {
              tasks.withType<Test>().configureEach {
                  filter {
                      // StackOverflowError parsing 355+ line string concatenation — upstream Kotlin parser bug
                      excludeTestsMatching("org.openrewrite.kotlin.tree.BinaryTest.deeplyNestedStringConcatenation")
                  }
              }
          }

          project(":rewrite-gradle") {
              tasks.withType<Test>().configureEach {
                  filter {
                      // NPE in GradleWrapperScriptLoader — this.resolved is null — upstream bug
                      excludeTestsMatching("org.openrewrite.gradle.UpdateGradleWrapperTest.defaultsToLatestRelease")
                      excludeTestsMatching("org.openrewrite.gradle.internal.GradleWrapperTest.listGradleWrappers")
                  }
              }
          }

          project(":rewrite-csharp") {
              tasks.withType<Test>().configureEach {
                  filter {
                      // RPC timeout after 60s — upstream C# parser issue
                      excludeTestsMatching("org.openrewrite.csharp.CSharpRecipeTest.changeMethodName")
                  }
              }
          }
          GRADLE
          HOOK
          chmod +x ~/git-hooks/post-checkout
          git config --global core.hooksPath ~/git-hooks
      - name: Download latest version of the validation scripts
        uses: gradle/develocity-build-validation-scripts/.github/actions/gradle/download@actions-stable
        with:
          downloadDevelopmentRelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Configure validation scripts network settings
        uses: gradle/develocity-oss-projects/.github/actions/configure-validation-scripts-network-settings@main
      - name: Run experiment 1
        uses: gradle/develocity-build-validation-scripts/.github/actions/gradle/experiment-1@actions-stable
        env:
          DEVELOCITY_ACCESS_KEY: "${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}"
        with:
          gitRepo: ${{ env.GIT_REPO }}
          tasks: ${{ env.TASKS }}
          develocityUrl: ${{ env.DEVELOCITY_URL }}
        if: matrix.experimentId == 1
      - name: Run experiment 2
        uses: gradle/develocity-build-validation-scripts/.github/actions/gradle/experiment-2@actions-stable
        env:
          DEVELOCITY_ACCESS_KEY: "${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}"
        with:
          gitRepo: ${{ env.GIT_REPO }}
          tasks: ${{ env.TASKS }}
          develocityUrl: ${{ env.DEVELOCITY_URL }}
          failIfNotFullyCacheable: true
        if: matrix.experimentId == 2
      - name: Run experiment 3
        uses: gradle/develocity-build-validation-scripts/.github/actions/gradle/experiment-3@actions-stable
        env:
          DEVELOCITY_ACCESS_KEY: "${{ secrets.DV_SOLUTIONS_ACCESS_KEY }}"
        with:
          gitRepo: ${{ env.GIT_REPO }}
          tasks: ${{ env.TASKS }}
          develocityUrl: ${{ env.DEVELOCITY_URL }}
          failIfNotFullyCacheable: true
        if: matrix.experimentId == 3
